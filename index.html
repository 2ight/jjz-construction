<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胶胶者建材 - 首页</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 语言切换按钮 -->
    <div class="lang-box">
        <button class="lang-btn" onclick="switchLang()" data-lang="langBtn">
            <span class="zh"></span>
            <span class="en"></span>
        </button>
    </div>

    <!-- 顶部导航 -->
    <header class="header">
        <div class="container">
            <button class="menu-toggle" onclick="toggleMobileMenu()" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <!-- 核心导航：首页 + 产品中心（移动端始终可见）-->
            <div class="nav-core">
                <a href="#home" class="nav-active" data-lang="nav.home">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <span class="nav-core-sep"></span>
                <a href="product.html" data-lang="nav.product">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
            </div>
            <!-- 完整下拉菜单（移动端）/ 全宽导航（桌面端）-->
            <nav class="nav" id="mainNav">
                <a href="#home" class="nav-active" data-lang="nav.home">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="#scenarios" data-lang="nav.scenarios">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="#advantage" data-lang="nav.advantage">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="#product" data-lang="nav.hotProduct">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="#factory" data-lang="nav.factory">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="#contact" data-lang="nav.contact">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
                <a href="product.html" data-lang="nav.product">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Banner 轮播 -->
    <section class="banner" id="home">
        <div class="banner-list">
            <div class="banner-item active">
                <img src="images/banner/banner1.jpg" alt="轮播图">
            </div>
            <div class="banner-item">
                <img src="images/banner/banner2.jpg" alt="轮播图">
            </div>
            <div class="banner-item">
                <img src="images/banner/banner3.jpg" alt="轮播图">
            </div>
        </div>
        <div class="container banner-text">
            <h1 data-lang="banner.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h1>
            <p data-lang="banner.desc">
                <span class="zh"></span>
                <span class="en"></span>
            </p>
            <a href="product.html" class="btn" data-lang="banner.btn">
                <span class="zh"></span>
                <span class="en"></span>
            </a>
        </div>
    </section>

    <!-- 装修需求应用场景 -->
    <section class="section section-alt" id="scenarios">
        <div class="container">
            <h2 class="section-title" data-lang="application.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h2>
            <p class="section-subtitle" data-lang="application.subtitle">
                <span class="zh"></span>
                <span class="en"></span>
            </p>
            <div class="app-scenarios" id="appScenarios">
                <!-- JS 动态渲染三个场景卡片 -->
            </div>
        </div>
    </section>

    <!-- 核心优势 -->
    <section class="section" id="advantage">
        <div class="container">
            <h2 class="section-title" data-lang="advantage.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h2>
            <div class="advantage-list">
                <div class="advantage-item">
                    <span class="adv-icon">🛡️</span>
                    <h3 data-lang="advantage.item1.title">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </h3>
                    <p data-lang="advantage.item1.desc">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </p>
                </div>
                <div class="advantage-item">
                    <span class="adv-icon">📦</span>
                    <h3 data-lang="advantage.item2.title">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </h3>
                    <p data-lang="advantage.item2.desc">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </p>
                </div>
                <div class="advantage-item">
                    <span class="adv-icon">⚙️</span>
                    <h3 data-lang="advantage.item3.title">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </h3>
                    <p data-lang="advantage.item3.desc">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </p>
                </div>
                <div class="advantage-item">
                    <span class="adv-icon">🤝</span>
                    <h3 data-lang="advantage.item4.title">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </h3>
                    <p data-lang="advantage.item4.desc">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- 主推产品：2000 / 996 / 999 -->
    <section class="section section-alt" id="product">
        <div class="container">
            <h2 class="section-title" data-lang="hotProduct.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h2>
            <div class="product-list">
                <!-- 产品 1：2000 水性密封胶 -->
                <div class="product-card">
                    <div class="product-img-wrap">
                        <img src="images/product/JJZ-2000.png" alt="胶胶者2000">
                        <span class="product-badge" data-lang="hotProduct.p1.badge">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </span>
                    </div>
                    <div class="product-info">
                        <h3 data-lang="hotProduct.p1.title">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </h3>
                        <p data-lang="hotProduct.p1.desc">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </p>
                        <div class="product-tags">
                            <span data-lang="hotProduct.p1.tags">
                                <span class="zh"></span>
                                <span class="en"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- 产品 2：996 油性粘结胶 -->
                <div class="product-card">
                    <div class="product-img-wrap">
                        <img src="images/product/JJZ-996.png" alt="胶胶者996">
                        <span class="product-badge" data-lang="hotProduct.p2.badge">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </span>
                    </div>
                    <div class="product-info">
                        <h3 data-lang="hotProduct.p2.title">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </h3>
                        <p data-lang="hotProduct.p2.desc">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </p>
                        <div class="product-tags">
                            <span data-lang="hotProduct.p2.tags">
                                <span class="zh"></span>
                                <span class="en"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- 产品 3：999 耐候密封胶 -->
                <div class="product-card">
                    <div class="product-img-wrap">
                        <img src="images/product/JJZ-999.png" alt="胶胶者999">
                        <span class="product-badge" data-lang="hotProduct.p3.badge">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </span>
                    </div>
                    <div class="product-info">
                        <h3 data-lang="hotProduct.p3.title">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </h3>
                        <p data-lang="hotProduct.p3.desc">
                            <span class="zh"></span>
                            <span class="en"></span>
                        </p>
                        <div class="product-tags">
                            <span data-lang="hotProduct.p3.tags">
                                <span class="zh"></span>
                                <span class="en"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div style="text-align:center; margin-top:40px;">
                <a href="product.html" class="btn" data-lang="hotProduct.allBtn">
                    <span class="zh"></span>
                    <span class="en"></span>
                </a>
            </div>
        </div>
    </section>

    <!-- 工厂实力 -->
    <section class="section" id="factory">
        <div class="container">
            <h2 class="section-title" data-lang="factory.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h2>
            <div class="factory-showcase">
                <div class="factory-img-card">
                    <img src="images/banner/banner1.jpg" alt="工厂实景">
                </div>
                <div class="factory-img-card">
                    <img src="images/banner/banner2.jpg" alt="工厂实景">
                </div>
                <div class="factory-img-card">
                    <img src="images/banner/banner3.jpg" alt="工厂实景">
                </div>
            </div>
            <p class="factory-desc" data-lang="factory.desc">
                <span class="zh"></span>
                <span class="en"></span>
            </p>
        </div>
    </section>

    <!-- 联系我们 -->
    <section class="section section-alt" id="contact">
        <div class="container">
            <h2 class="section-title" data-lang="contact.title">
                <span class="zh"></span>
                <span class="en"></span>
            </h2>
            <div class="contact-card">
                <div class="contact-row">
                    <span class="ci-label" data-lang="contact.telTip">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </span>
                    <span class="ci-value" id="telText"></span>
                </div>
                <div class="contact-row">
                    <span class="ci-label" data-lang="contact.addrTip">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </span>
                    <span class="ci-value" id="addrText"></span>
                </div>
                <div class="contact-row">
                    <span class="ci-label" data-lang="contact.emailTip">
                        <span class="zh"></span>
                        <span class="en"></span>
                    </span>
                    <span class="ci-value" id="emailText"></span>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部版权 -->
    <footer class="footer">
        <div class="container">
            <p>
                &copy; <span id="copyYear"></span>
                <span data-lang="footer.copyright">
                    <span class="zh"></span>
                    <span class="en"></span>
                </span>
            </p>
        </div>
    </footer>

    <!-- JS引入顺序：配置 → 文案 → 逻辑（含应用场景渲染和语言同步）-->
    <script src="js/config.js"></script>
    <script src="js/langData.js"></script>
    <script src="js/lang.js"></script>
</body>

</html>
